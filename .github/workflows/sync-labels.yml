name: Sync lifecycle labels

# Keeps the canonical issue-lifecycle labels (.github/labels.yml) present and
# up to date. NON-DESTRUCTIVE: creates-or-updates only the labels in the manifest
# and never deletes any others, so topic/priority labels are safe.
on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/sync-labels.yml
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upsert lifecycle labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const text = fs.readFileSync('.github/labels.yml', 'utf8');
            // Minimal YAML parse for our fixed shape: a list of {name,color,description}.
            const labels = [];
            let cur = null;
            for (const raw of text.split('\n')) {
              const line = raw.replace(/\s+$/, '');
              if (/^\s*#/.test(line) || line.trim() === '') continue;
              const m = line.match(/^- name:\s*"?(.*?)"?\s*$/);
              if (m) { cur = { name: m[1] }; labels.push(cur); continue; }
              if (!cur) continue;
              const c = line.match(/^\s+color:\s*"?(.*?)"?\s*$/);
              if (c) { cur.color = c[1]; continue; }
              const d = line.match(/^\s+description:\s*"?(.*?)"?\s*$/);
              if (d) { cur.description = d[1]; continue; }
            }
            core.info(`Parsed ${labels.length} lifecycle labels.`);
            // GitHub caps label descriptions at 100 chars; validate ALL up front so a
            // single bad entry fails the run loudly instead of half-applying the set.
            const tooLong = labels.filter(l => (l.description || '').length > 100);
            if (tooLong.length) {
              core.setFailed(`Label description(s) exceed 100 chars: ${tooLong.map(l => `${l.name} (${l.description.length})`).join(', ')}`);
              return;
            }
            let failed = 0;
            for (const l of labels) {
              const color = (l.color || '').replace(/^#/, '');
              try {
                let exists = true;
                try { await github.rest.issues.getLabel({ ...context.repo, name: l.name }); }
                catch (e) { exists = false; }
                if (exists) {
                  await github.rest.issues.updateLabel({ ...context.repo, name: l.name,
                    new_name: l.name, color, description: l.description || '' });
                  core.info(`Updated '${l.name}'.`);
                } else {
                  await github.rest.issues.createLabel({ ...context.repo, name: l.name,
                    color, description: l.description || '' });
                  core.info(`Created '${l.name}'.`);
                }
              } catch (e) {
                failed++;
                core.error(`Failed to sync '${l.name}': ${e.message}`);
              }
            }
            if (failed) core.setFailed(`${failed} label(s) failed to sync.`);
