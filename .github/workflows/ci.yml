name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: CLI --help exits cleanly
        run: pnpm dev:cli --help

      - name: API starts and responds on /healthz
        run: |
          pnpm dev:api &
          API_PID=$!

          # wait for the server to be ready (up to 10s)
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8787/healthz > /dev/null 2>&1; then
              echo "API healthy after ~$((i / 2))s"
              break
            fi
            sleep 0.5
          done

          curl -sf http://127.0.0.1:8787/healthz | grep '"ok":true'
          kill $API_PID

  e2e:
    name: E2E Install
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Pre-pull Docker images
        run: |
          docker pull postgres:16-alpine &
          docker pull matrixdotorg/synapse:v1.125.0 &
          wait

      - name: Run full installer (local-dev, non-interactive)
        run: |
          sudo env "PATH=$PATH" npx tsx src/bin/sovereign-node.ts install \
            --request-file test/fixtures/ci-install-request.json \
            --json | tee /tmp/install-result.json

          # Fail the step if the installer reports a logical failure
          STATE=$(jq -r '.result.job.state' /tmp/install-result.json)
          if [ "$STATE" != "succeeded" ]; then
            echo "::error::Installer finished with state=$STATE (expected succeeded)"
            jq '.result.job.steps[] | select(.state == "failed")' /tmp/install-result.json
            exit 1
          fi
        timeout-minutes: 15

      - name: Verify Matrix is reachable
        run: |
          curl -f --retry 3 --retry-delay 2 http://127.0.0.1:8008/_matrix/client/versions | jq .

      - name: Verify operator account exists
        run: |
          curl -f --retry 3 --retry-delay 2 http://127.0.0.1:8008/_matrix/client/v3/login | jq .

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== install result ==="
          cat /tmp/install-result.json 2>/dev/null | jq . || true
          echo "=== sovereign-node status ==="
          sudo env "PATH=$PATH" npx tsx src/bin/sovereign-node.ts status --json 2>&1 || true
          echo "=== docker compose logs ==="
          COMPOSE_DIR=$(find /etc/sovereign-node -name compose.yaml -exec dirname {} \; 2>/dev/null | head -1)
          if [ -n "$COMPOSE_DIR" ]; then
            cd "$COMPOSE_DIR" && docker compose logs --tail=100 2>&1 || true
          fi
