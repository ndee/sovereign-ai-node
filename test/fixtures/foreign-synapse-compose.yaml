# A "foreign" Matrix-like homeserver that deterministically squats on
# 127.0.0.1:8008 — the same host port the bundled-matrix installer binds. Used by
# the CI `rerun-after-partial-failure` scenario to reproduce the field bug from
# https://github.com/ndee/sovereign-ai-node/issues/179: a leftover install from a
# different compose project owns the port, so the new install's Synapse can never
# bind it.
#
# We intentionally do NOT run a real Synapse here. A real Synapse needs config
# generation and a DB and can crash on boot (releasing the port), which makes the
# repro flaky — the whole point is that the port stays held. Instead we run a tiny,
# rock-solid HTTP server (stdlib only, in the synapse image which already ships
# python3) that:
#   * binds 0.0.0.0:8008 and stays up (holds the port), and
#   * answers like a *different* homeserver — `/_matrix/client/versions` returns a
#     versions array (so a readiness probe sees a live server) and
#     `/_matrix/key/v2/server` reports server_name "foreign.local.test".
# That reproduces both the port conflict (the install's Synapse can't bind) and,
# if any probe reaches this server, the server-identity mismatch
# (MATRIX_FOREIGN_SYNAPSE_ON_PORT) — the install must NOT bootstrap against it.
services:
  synapse:
    image: matrixdotorg/synapse:v1.125.0
    entrypoint: ["python3", "-c"]
    command:
      - |
        from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
        import json

        class H(BaseHTTPRequestHandler):
            def _send(self, body):
                payload = json.dumps(body).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.end_headers()
                self.wfile.write(payload)

            def do_GET(self):
                if self.path.startswith("/_matrix/key/v2/server"):
                    self._send({"server_name": "foreign.local.test",
                                "valid_until_ts": 0, "verify_keys": {}})
                elif self.path.startswith("/_matrix/client/versions"):
                    self._send({"versions": ["v1.1", "v1.2"]})
                else:
                    self._send({})

            def do_POST(self):
                # Mimic a foreign Synapse rejecting an unknown operator login,
                # the exact 500 symptom from issue #179.
                self.send_response(500)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(b'{"errcode":"M_UNKNOWN","error":"Internal server error"}')

            def log_message(self, *args):
                pass

        ThreadingHTTPServer(("0.0.0.0", 8008), H).serve_forever()
    ports:
      - "127.0.0.1:8008:8008"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8008/_matrix/client/versions\", timeout=5).read()'"]
      interval: 3s
      timeout: 5s
      retries: 20
