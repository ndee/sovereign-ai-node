- name: Ensure Sovereign config directory exists
  ansible.builtin.file:
    path: "{{ sovereign_node_request_file | dirname }}"
    state: directory
    mode: "0750"

- name: Render install request file
  ansible.builtin.template:
    src: install-request.json.j2
    dest: "{{ sovereign_node_request_file }}"
    mode: "0640"
