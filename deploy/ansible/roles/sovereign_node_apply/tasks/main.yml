- name: Detect existing runtime config
  ansible.builtin.stat:
    path: "{{ sovereign_node_runtime_config_file }}"
  register: sovereign_node_runtime_config_stat

- name: Detect installed Sovereign Node binary
  ansible.builtin.stat:
    path: "{{ sovereign_node_binary_path }}"
  register: sovereign_node_binary_stat

- name: Select installer mode
  ansible.builtin.set_fact:
    sovereign_node_apply_mode: "{{ sovereign_node_apply_mode_override if sovereign_node_apply_mode_override in ['install', 'update'] else ('update' if sovereign_node_runtime_config_stat.stat.exists or sovereign_node_binary_stat.stat.exists else 'install') }}"

- name: Run Sovereign installer wrapper
  ansible.builtin.command:
    argv:
      - bash
      - scripts/install.sh
      - "--{{ sovereign_node_apply_mode }}"
      - --non-interactive
      - --request-file
      - "{{ sovereign_node_request_file }}"
      - --source-dir
      - "{{ sovereign_node_checkout_path }}"
      - --bots-source-dir
      - "{{ sovereign_bots_checkout_path }}"
      - --install-root
      - "{{ sovereign_node_install_root }}"
      - --service-user
      - "{{ sovereign_node_service_user }}"
      - --service-group
      - "{{ sovereign_node_service_group }}"
      - --api-host
      - "{{ sovereign_node_api_host }}"
      - --api-port
      - "{{ sovereign_node_api_port | string }}"
  args:
    chdir: "{{ sovereign_node_checkout_path }}"
  register: sovereign_node_apply_result
  changed_when: true
