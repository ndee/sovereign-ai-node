- name: Ensure source checkout root exists
  ansible.builtin.file:
    path: "{{ sovereign_node_checkout_root }}"
    state: directory
    mode: "0755"

- name: Ensure git is installed
  ansible.builtin.package:
    name: git
    state: present

- name: Check out sovereign-ai-node source
  ansible.builtin.git:
    repo: "{{ sovereign_node_repo_url }}"
    dest: "{{ sovereign_node_checkout_path }}"
    version: "{{ sovereign_node_repo_ref }}"
    update: true

- name: Check out sovereign-ai-bots source
  ansible.builtin.git:
    repo: "{{ sovereign_bots_repo_url }}"
    dest: "{{ sovereign_bots_checkout_path }}"
    version: "{{ sovereign_bots_repo_ref }}"
    update: true
