- name: Apply compiled Sovereign host resources locally
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    sovereign_host_resources_plan_file: "{{ sovereign_host_resources_plan_file | default('/etc/sovereign-node/host-resources.json') }}"
  roles:
    - sovereign_host_resources_apply
    - sovereign_host_resources_verify
